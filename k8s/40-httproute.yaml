# Example Gateway API route — the values below are this project's own
# production route (ms-01 cluster); set the hostname and parentRef to match
# your own Gateway. Prefer a plain Ingress? See the wiki → Deployment on
# Kubernetes.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: reminders-app
  namespace: reminders-app
spec:
  hostnames:
    - tasks.rke.alaras.net
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gateway   # your Gateway's name
      namespace: gateway     # the namespace your Gateway lives in
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: reminders-app
          port: 80
          weight: 1
