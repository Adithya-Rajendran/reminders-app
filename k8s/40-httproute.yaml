apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: reminders-app
  namespace: reminders-app
spec:
  hostnames:
    - tasks.rke.alaras.net
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gateway
      namespace: gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: reminders-app
          port: 80
          weight: 1
