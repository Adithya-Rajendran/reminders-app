# Example Gateway API route — set the hostname and parentRef to match your own
# Gateway. Prefer a plain Ingress? See the wiki → Deployment on Kubernetes.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: reminders-app
  namespace: reminders-app
spec:
  hostnames:
    - tasks.example.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: my-gateway              # your Gateway's name
      namespace: gateway-namespace  # the namespace your Gateway lives in
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: reminders-app
          port: 80
          weight: 1
