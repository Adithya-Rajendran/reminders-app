apiVersion: v1
kind: Service
metadata:
  name: reminders-app
  namespace: reminders-app
  labels: { app: reminders-app }
spec:
  selector: { app: reminders-app }
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reminders-app
  namespace: reminders-app
  labels: { app: reminders-app }
spec:
  replicas: 1
  # The RWO volume can't be multi-attached, so a rolling update would deadlock —
  # recreate the pod instead (brief downtime on deploy is fine).
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: reminders-app }
  template:
    metadata:
      labels: { app: reminders-app, app.kubernetes.io/part-of: reminders-app }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000              # so uid 1000 can write the freshly-attached /data volume
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/adithya-rajendran/reminders-app:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            # Tasks/reminders live in the user's CalDAV server; only config +
            # dashboard layout (+ sessions) live in this SQLite file on the volume.
            - name: CONFIG_DB_PATH
              value: /data/config.db
            # Optional: point the read cache (server/cache.js) at the Valkey
            # instance in 25-valkey.yaml so it survives a pod restart instead
            # of re-REPORTing every CalDAV list cold. Remove this env var (or
            # the 25-valkey.yaml Deployment) and the app falls back to its
            # in-process cache with no other change — see k8s/README.md.
            - name: VALKEY_URL
              value: redis://reminders-valkey.reminders-app.svc.cluster.local:6379
          envFrom:
            - secretRef: { name: reminders-app-env }
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { memory: 256Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: reminders-data
