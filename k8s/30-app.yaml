apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-src
  namespace: reminders-app
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: reminders-app
  namespace: reminders-app
  labels: { app: reminders-app }
spec:
  selector: { app: reminders-app }
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reminders-app
  namespace: reminders-app
  labels: { app: reminders-app }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: reminders-app }
  template:
    metadata:
      labels: { app: reminders-app, app.kubernetes.io/part-of: reminders-app }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: node:22
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          workingDir: /app
          # Code is delivered to the PVC via `kubectl cp`; the container waits
          # for the readiness marker, then runs the BFF. (No registry needed.)
          command: ["sh", "-c"]
          args:
            - |
              echo "waiting for app code at /app/.ready ..."
              while [ ! -f /app/.ready ]; do sleep 2; done
              cd /app && exec node server/index.js
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
          envFrom:
            - secretRef: { name: reminders-app-env }
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { memory: 256Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: src
              mountPath: /app
      volumes:
        - name: src
          persistentVolumeClaim:
            claimName: app-src
