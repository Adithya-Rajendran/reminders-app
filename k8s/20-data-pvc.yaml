# Small block volume for the SQLite config DB. Use a ReadWriteOnce block-storage
# class (real ext4/xfs) so SQLite's POSIX file locking + WAL are safe — never put
# SQLite on a shared filesystem (NFS/CephFS). RWO + single replica + Recreate
# means exactly one process ever opens the file.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: reminders-data
  namespace: reminders-app
  labels: { app: reminders-app }
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ceph-rbd   # this project's real cluster (Ceph RBD, RWO block); set to your own cluster's RWO block-storage class

  resources:
    requests:
      storage: 1Gi
