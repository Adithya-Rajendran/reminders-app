{{- if .Values.route.enabled }}
{{- if not .Values.route.hostname }}
{{- fail "route.enabled requires route.hostname" }}
{{- end }}
# Gateway API HTTPRoute (this app deliberately ships no Ingress — prefer a
# plain Ingress? See the wiki → Deployment on Kubernetes).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "reminders-app.fullname" . }}
  labels:
    {{- include "reminders-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  hostnames:
    - {{ .Values.route.hostname | quote }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.route.parentRef.name | quote }}
      namespace: {{ .Values.route.parentRef.namespace | quote }}
      {{- with .Values.route.parentRef.sectionName }}
      sectionName: {{ . | quote }}
      {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "reminders-app.fullname" . }}
          port: {{ .Values.service.port }}
          weight: 1
{{- end }}
