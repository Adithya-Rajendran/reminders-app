# CD: roll the cluster deployment onto the freshly pushed :latest after the
# docker workflow succeeds on main (or on demand via workflow_dispatch).
#
# Runs on the `reminders-ci` GitHub ARC runner scale set — a runner pod living
# INSIDE the cluster (namespace arc-runners), not a GitHub-hosted box. kubectl
# auto-authenticates via that pod's ServiceAccount (reminders-ci-runner, RBAC:
# deployments get/list/patch, deployments/scale get/patch/update, pods
# get/list/watch — namespace-scoped to reminders-app) using in-cluster config.
# No kubeconfig is written or read here, and no cluster credential of any kind
# is stored in GitHub: a leaked Actions log can at worst restart/scale this
# one Deployment, nothing more. See k8s/README.md for the full RBAC writeup.
#
# Paused-by-default: this homelab habitually scales reminders-app to 0
# replicas as its steady state. That's not a failure — it's read up front and
# the rollout is skipped (exit 0) rather than fighting the intentional pause.
#
# Verification note: the Deployment uses strategy Recreate on a ReadWriteOnce
# PVC, so `kubectl rollout status` is expected to exceed its timeout while the
# volume detaches — we poll pod readiness and the public /healthz instead.
name: deploy

on:
  workflow_run:
    workflows: [docker]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  TZ: UTC

concurrency:
  group: deploy-production
  cancel-in-progress: false # never cancel a mid-flight rollout

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: reminders-ci
    timeout-minutes: 10
    environment: production
    steps:
      # Belt-and-braces: kubectl is baked into the custom runner image
      # (runner/Dockerfile), but if the scale set is temporarily running the
      # stock actions-runner image, fetch the same pinned binary into a
      # user-writable dir (restricted PSA — no sudo) instead of failing.
      # Keep the pinned minor in sync with runner/Dockerfile's KUBECTL_MINOR.
      - name: Ensure kubectl
        run: |
          if command -v kubectl >/dev/null 2>&1; then
            kubectl version --client=true
            exit 0
          fi
          echo "::warning::kubectl not on PATH — runner is not on the custom reminders-ci image; fetching a pinned binary"
          mkdir -p "$RUNNER_TEMP/bin"
          KUBECTL_VERSION=$(curl -fsSL https://dl.k8s.io/release/stable-1.30.txt)
          curl -fsSLo "$RUNNER_TEMP/bin/kubectl" "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x "$RUNNER_TEMP/bin/kubectl"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/kubectl" version --client=true

      - name: Check current replica count
        id: replicas
        run: |
          current=$(kubectl get deployment/reminders-app -n reminders-app -o jsonpath='{.spec.replicas}')
          echo "replicas=$current" >> "$GITHUB_OUTPUT"
          if [ "$current" = "0" ]; then
            echo "::notice::deployment/reminders-app is paused (replicas=0); skipping rollout — scale up to enable CD (kubectl scale deployment/reminders-app -n reminders-app --replicas=1)."
            echo "### deploy skipped — deployment is paused (replicas=0)" >> "$GITHUB_STEP_SUMMARY"
            echo "Scale up to enable CD: \`kubectl scale deployment/reminders-app -n reminders-app --replicas=1\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      # No docker daemon on this runner (plain-mode ARC pod), so the expected
      # digest is resolved straight from the GHCR Registry HTTP API (anonymous
      # pull token + the `Docker-Content-Digest` response header) instead of
      # `docker buildx imagetools inspect`. Same value, no docker required.
      - name: Resolve expected image digest
        id: expected
        if: steps.replicas.outputs.replicas != '0'
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          token=$(curl -fsS "https://ghcr.io/token?scope=repository:${repo}:pull" \
            | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')
          if [ -z "$token" ]; then
            echo "::error::could not obtain a GHCR pull token for $repo"
            exit 1
          fi
          digest=$(curl -fsS \
            -H "Authorization: Bearer ${token}" \
            -H 'Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.docker.distribution.manifest.v2+json,application/vnd.oci.image.manifest.v1+json' \
            -D - -o /dev/null \
            "https://ghcr.io/v2/${repo}/manifests/latest" \
            | tr -d '\r' | grep -i '^docker-content-digest:' | awk '{print $2}')
          if [ -z "$digest" ]; then
            echo "::error::could not resolve the pushed digest for ghcr.io/${repo}:latest from the GHCR registry API"
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Expected ghcr.io/${repo}@${digest}" >> "$GITHUB_STEP_SUMMARY"

      - name: Roll the deployment
        if: steps.replicas.outputs.replicas != '0'
        env:
          EXPECTED_DIGEST: ${{ steps.expected.outputs.digest }}
        run: |
          kubectl rollout restart deployment/reminders-app -n reminders-app
          # Recreate strategy: wait for the replacement pod to be Running/Ready.
          pod=""
          for i in $(seq 1 60); do
            total=$(kubectl get pods -n reminders-app -l app=reminders-app --no-headers 2>/dev/null | wc -l)
            pod=$(kubectl get pods -n reminders-app -l app=reminders-app -o jsonpath='{range .items[?(@.status.containerStatuses[0].ready==true)]}{.metadata.name}{"\n"}{end}' 2>/dev/null | head -n1)
            [ -n "$pod" ] && [ "$total" -eq 1 ] && { echo "pod ready: $pod"; break; }
            sleep 5
          done
          kubectl get pods -n reminders-app -l app=reminders-app
          if [ -z "$pod" ]; then
            echo "::error::replacement pod did not become ready"
            exit 1
          fi
          image_id=$(kubectl get pod "$pod" -n reminders-app -o jsonpath='{.status.containerStatuses[0].imageID}')
          echo "Running image: $image_id"
          case "$image_id" in
            *"@$EXPECTED_DIGEST") echo "digest verified: $EXPECTED_DIGEST" ;;
            *) echo "::error::running image digest $image_id does not match expected $EXPECTED_DIGEST"; exit 1 ;;
          esac

      - name: Verify the app answers
        if: steps.replicas.outputs.replicas != '0'
        run: |
          for i in $(seq 1 30); do
            body=$(curl -fsS --max-time 5 https://tasks.rke.alaras.net/healthz || true)
            echo "$body" | grep -q '"ok":true' && echo "$body" | grep -q '"oidc":true' && { echo "healthz ok with oidc"; break; }
            sleep 5
          done
          body=$(curl -fsS --max-time 5 https://tasks.rke.alaras.net/healthz || true)
          echo "$body" | grep -q '"ok":true' || { echo "::error::app did not answer ok on /healthz after the rollout"; exit 1; }
          echo "$body" | grep -q '"oidc":true' || { echo "::error::OIDC is not enabled on /healthz"; exit 1; }
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 -H 'x-dev-user: deploy-check' https://tasks.rke.alaras.net/api/me || true)
          [ "$code" = "401" ] || { echo "::error::x-dev-user returned $code on production app"; exit 1; }
          echo "production auth verified"
