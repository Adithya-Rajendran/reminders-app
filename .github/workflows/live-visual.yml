# Runs the resize/visual-polish Playwright audit against the dev fixture
# stack (reminders-dev + its radicale/wsgidav CalDAV/WebDAV backends) inside
# the cluster, on the same in-cluster `reminders-ci` ARC runner set that
# deploy.yml uses. kubectl auto-authenticates via the pod's ServiceAccount
# (in-cluster config — no kubeconfig, no secret).
#
# reminders-dev deliberately has NO public HTTPRoute: it runs with
# ALLOW_DEV_BYPASS=1, so any request carrying an `x-dev-user` header
# authenticates as that user — exposing it publicly would let anyone
# impersonate anybody. It's reachable here only because this job itself runs
# in-cluster and addresses the ClusterIP Service directly
# (http://reminders-dev.reminders-dev.svc); there is no DEV_VISUAL_BASE_URL
# repo variable anymore, and there must never be a public one for this host.
name: live-visual

on:
  workflow_run:
    workflows: [deploy]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  TZ: UTC
  DEV_VISUAL_USER: ${{ vars.DEV_VISUAL_USER || 'visual-audit-user' }}
  DEV_K8S_NAMESPACE: ${{ vars.DEV_K8S_NAMESPACE || 'reminders-dev' }}
  DEV_K8S_DEPLOYMENT: ${{ vars.DEV_K8S_DEPLOYMENT || 'reminders-dev' }}
  # Fixture CalDAV/WebDAV backends behind reminders-dev — cluster-only
  # (ConfigMap-seeded), not defined in this repo's k8s/ manifests. Adjust
  # here if their Deployment names ever differ on the cluster.
  DEV_K8S_RADICALE_DEPLOYMENT: radicale
  DEV_K8S_WSGIDAV_DEPLOYMENT: wsgidav
  # CalDAV account the "Provision dev fixture data" step connects through the
  # app's real Add-account API (test/e2e/live-provision.mjs). Defaults mirror
  # test/e2e/setup-backends.sh's convention (same credentials, same
  # /<user>/tasks/ seeded collection) — the reminders-dev fixture's Radicale
  # ConfigMap is built the same way. The password isn't a real secret (it's
  # already committed in plaintext in setup-backends.sh, same as the local
  # e2e harness) — override via repo vars if the fixture ever diverges.
  DEV_CALDAV_URL: ${{ vars.DEV_CALDAV_URL || 'http://radicale.reminders-dev.svc:5232/' }}
  DEV_CALDAV_USER: ${{ vars.DEV_CALDAV_USER || 'e2e' }}
  DEV_CALDAV_PASS: ${{ vars.DEV_CALDAV_PASS || 'e2epw' }}
  # Chromium + system deps are preinstalled in the reminders-ci runner image
  # (see runner/Dockerfile) — never `playwright install` at job time.
  PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

concurrency:
  group: live-visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resize-audit:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: reminders-ci
    timeout-minutes: 20
    steps:
      # Belt-and-braces: kubectl is baked into the custom runner image
      # (runner/Dockerfile), but if the scale set is temporarily running the
      # stock actions-runner image, fetch the same pinned binary into a
      # user-writable dir (restricted PSA — no sudo) instead of failing.
      # Keep the pinned minor in sync with runner/Dockerfile's KUBECTL_MINOR.
      - name: Ensure kubectl
        run: |
          if command -v kubectl >/dev/null 2>&1; then
            kubectl version --client=true
            exit 0
          fi
          echo "::warning::kubectl not on PATH — runner is not on the custom reminders-ci image; fetching a pinned binary"
          mkdir -p "$RUNNER_TEMP/bin"
          KUBECTL_VERSION=$(curl -fsSL https://dl.k8s.io/release/stable-1.30.txt)
          curl -fsSLo "$RUNNER_TEMP/bin/kubectl" "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x "$RUNNER_TEMP/bin/kubectl"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/kubectl" version --client=true

      # Unlike kubectl, browsers are NOT worth fetching at job time (hundreds
      # of MB plus apt system deps we can't install without root under the
      # restricted PSA) — if they're missing, the scale set isn't on the
      # custom image yet and the only fix is publishing it (runner-image
      # workflow) and recycling the runner pods. Fail loud and early, before
      # scaling anything up.
      - name: Verify preinstalled Playwright browsers
        run: |
          if [ ! -d "$PLAYWRIGHT_BROWSERS_PATH" ] || [ -z "$(ls -A "$PLAYWRIGHT_BROWSERS_PATH" 2>/dev/null)" ]; then
            echo "::error::$PLAYWRIGHT_BROWSERS_PATH is missing or empty — the reminders-ci scale set is not running the custom runner image (runner/Dockerfile). Publish it via the runner-image workflow and recycle the runner pods; this job never installs browsers itself."
            exit 1
          fi
          ls "$PLAYWRIGHT_BROWSERS_PATH"

      - uses: actions/checkout@v4

      # Node 22 is preinstalled on the runner image — just install deps.
      - name: Install e2e deps
        working-directory: test/e2e
        run: npm ci

      - name: Scale up dev fixture stack
        run: |
          kubectl scale "deployment/${DEV_K8S_DEPLOYMENT}" -n "$DEV_K8S_NAMESPACE" --replicas=1
          kubectl scale "deployment/${DEV_K8S_RADICALE_DEPLOYMENT}" -n "$DEV_K8S_NAMESPACE" --replicas=1
          kubectl scale "deployment/${DEV_K8S_WSGIDAV_DEPLOYMENT}" -n "$DEV_K8S_NAMESPACE" --replicas=1
          for dep in "$DEV_K8S_DEPLOYMENT" "$DEV_K8S_RADICALE_DEPLOYMENT" "$DEV_K8S_WSGIDAV_DEPLOYMENT"; do
            app_label=$(kubectl get "deployment/$dep" -n "$DEV_K8S_NAMESPACE" -o jsonpath='{.spec.selector.matchLabels.app}')
            [ -z "$app_label" ] && app_label="$dep"
            ready=""
            for i in $(seq 1 60); do
              ready=$(kubectl get pods -n "$DEV_K8S_NAMESPACE" -l "app=$app_label" -o jsonpath='{range .items[?(@.status.containerStatuses[0].ready==true)]}{.metadata.name}{"\n"}{end}' 2>/dev/null | head -n1)
              [ -n "$ready" ] && { echo "$dep ready: $ready"; break; }
              sleep 5
            done
            if [ -z "$ready" ]; then
              kubectl get pods -n "$DEV_K8S_NAMESPACE"
              echo "::error::$dep did not become ready"
              exit 1
            fi
          done

      # reminders-dev runs with CONFIG_DB_PATH=/tmp/config.db (ephemeral) so
      # every scale-up above boots a brand-new app with no CalDAV account —
      # without this, the audit's task/event/note seeding PUTs just hang or
      # 4xx against an unconfigured app. Provisions entirely through the app's
      # own HTTP API (same calls the Settings UI makes) — this runner's
      # ServiceAccount has no pods/exec RBAC, so there's no way to reach the
      # dev app's storage directly. Idempotent: safe on a retried step.
      - name: Provision dev fixture data
        working-directory: test/e2e
        env:
          # DEV_VISUAL_USER and the DEV_CALDAV_* credentials are already set
          # job-wide above — only BASE_URL needs computing here.
          BASE_URL: http://${{ env.DEV_K8S_DEPLOYMENT }}.${{ env.DEV_K8S_NAMESPACE }}.svc
        run: node live-provision.mjs

      - name: Run live dev resize audit
        working-directory: test/e2e
        env:
          BASE_URL: http://${{ env.DEV_K8S_DEPLOYMENT }}.${{ env.DEV_K8S_NAMESPACE }}.svc
          E2E_USER: ${{ env.DEV_VISUAL_USER }}
          CI: true
        run: |
          npx playwright test specs/resize-polish.spec.mjs
          npm run e2e:report-check

      - name: Upload live visual artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: live-visual-resize-artifacts
          path: |
            test/e2e/.artifacts
            test/e2e/playwright-report
            test/e2e/test-results
          retention-days: 14

      # Always scale back down, even if the audit failed or the job was
      # cancelled — this stack is a paused-by-default fixture, not a
      # long-running dev environment.
      - name: Scale down dev fixture stack
        if: always()
        run: |
          kubectl scale "deployment/${DEV_K8S_DEPLOYMENT}" -n "$DEV_K8S_NAMESPACE" --replicas=0 || true
          kubectl scale "deployment/${DEV_K8S_RADICALE_DEPLOYMENT}" -n "$DEV_K8S_NAMESPACE" --replicas=0 || true
          kubectl scale "deployment/${DEV_K8S_WSGIDAV_DEPLOYMENT}" -n "$DEV_K8S_NAMESPACE" --replicas=0 || true
