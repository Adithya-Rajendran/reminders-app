name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build SPA
        run: npm run build
      - name: Server syntax check
        run: for f in server/*.js; do node --check "$f"; done
      - name: Unit tests
        run: for t in test/*.test.mjs; do node "$t"; done

  e2e:
    # End-to-end: real SPA + BFF driven by Playwright against a real CalDAV
    # (Radicale) and WebDAV (wsgidav) backend. Gated on lint-build so it only
    # runs once the cheap checks pass. See test/e2e/ for the harness.
    needs: lint-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install app deps
        working-directory: app
        run: npm ci
      - name: Install e2e deps + browser
        working-directory: test/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run e2e (backends + BFF + Playwright)
        run: bash test/e2e/run.sh
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test/e2e/playwright-report
            test/e2e/test-results
            test/e2e/.state/*.log
          retention-days: 7
