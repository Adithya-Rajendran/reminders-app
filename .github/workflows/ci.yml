name: ci

on:
  push:
    branches: [main]
  pull_request:

# Superseded pushes to a PR cancel their older runs; main runs always finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  TZ: UTC

jobs:
  lint-build:
    runs-on: ubuntu-latest # deliberate: stays GitHub-hosted alongside the docker job below, which needs a real Docker daemon the reminders-ci cluster runners (plain-mode ARC, no docker) don't have
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build SPA
        run: npm run build
      - name: Server syntax check
        run: npm run check
      # One entry point (test/run.mjs) runs every test/*.test.mjs and aggregates
      # the result — new tests (e.g. the widget↔app connection contract in
      # connections.test.mjs / widget-contract.test.mjs) are picked up automatically.
      - name: Unit tests
        run: npm test
      # Component render tests (vitest + jsdom + Testing Library) — *.test.jsx,
      # separate from the framework-free node runner above. Covers the high-risk
      # logic that lives in JSX (Calendar/Notes/Cues/Reminders) + the
      # manifest↔registry parity gate and the widget-SDK surface tripwire.
      - name: Component tests
        run: npm run test:component

  docker:
    # Runs the same checks inside the image's `test` stage (CI parity in a
    # container — also the only in-container build of native better-sqlite3),
    # then builds AND BOOTS the production image: a missing-file crash-on-boot
    # (the server imports client/src at module load) passes a build-only job.
    runs-on: ubuntu-latest # deliberate: needs a Docker daemon (buildx build+boot-smoke) — the reminders-ci cluster runners run plain-mode with no docker
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Lint, build, syntax check & tests in the Docker test stage
        uses: docker/build-push-action@v6
        with:
          context: ./app
          target: test
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build the production runtime image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          target: runtime
          push: false
          load: true
          tags: reminders-app:runtime
          cache-from: type=gha
      - name: Boot smoke test the runtime image
        run: bash app/scripts/smoke-image.sh reminders-app:runtime

  e2e:
    # End-to-end: real SPA + BFF driven by Playwright against a real CalDAV
    # (Radicale) and WebDAV (wsgidav) backend, all inside this GitHub-hosted
    # runner — no self-hosted infra. Gated on lint-build so it only runs once
    # the cheap checks pass. See test/e2e/ for the harness.
    needs: lint-build
    runs-on: ubuntu-latest # deliberate: kept alongside the rest of this file's GitHub-hosted jobs (see docker job above) rather than split onto the docker-less cluster runners
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            test/e2e/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: test/e2e/requirements.txt
      - name: Cache e2e python venv
        uses: actions/cache@v4
        with:
          path: test/e2e/.venv
          key: venv-${{ runner.os }}-py311-${{ hashFiles('test/e2e/requirements.txt') }}
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('test/e2e/package-lock.json') }}
      - name: Install app deps
        working-directory: app
        run: npm ci
      - name: Install e2e deps + browser
        working-directory: test/e2e
        run: |
          npm ci
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi
      - name: Run e2e (backends + BFF + Playwright)
        run: |
          bash test/e2e/run.sh
          (cd test/e2e && npm run e2e:report-check)
      # Upload on every non-cancelled outcome: retried-then-passed specs leave
      # flake evidence in test-results/ that `if: failure()` would discard.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test/e2e/playwright-report
            test/e2e/test-results
            test/e2e/.artifacts
            test/e2e/.state/*.log
          retention-days: 7
