name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build SPA
        run: npm run build
      - name: Server syntax check
        run: for f in server/*.js; do node --check "$f"; done
      - name: Unit tests
        run: for t in test/*.test.mjs; do node "$t"; done
