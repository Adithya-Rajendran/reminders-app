name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build SPA
        run: npm run build
      - name: Server syntax check
        run: npm run check
      # One entry point (test/run.mjs) runs every test/*.test.mjs and aggregates
      # the result — new tests (e.g. the widget↔app connection contract in
      # connections.test.mjs / widget-contract.test.mjs) are picked up automatically.
      - name: Unit tests
        run: npm test
      # Component render tests (vitest + jsdom + Testing Library) — *.test.jsx,
      # separate from the framework-free node runner above. Covers the high-risk
      # logic that lives in JSX (Calendar/Notes/Cues/Reminders) + the
      # manifest↔registry parity gate and the widget-SDK surface tripwire.
      - name: Component tests
        run: npm run test:component

  docker:
    # Runs the same checks inside the image's `test` stage (CI parity in a
    # container) and confirms the production image still builds. Independent of
    # lint-build so the two run in parallel.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - name: Lint, build, syntax check & unit tests in the Docker test stage
        run: docker build --target test -t reminders-app:test .
      - name: Build the production runtime image
        run: docker build --target runtime -t reminders-app:runtime .

  e2e:
    # End-to-end: real SPA + BFF driven by Playwright against a real CalDAV
    # (Radicale) and WebDAV (wsgidav) backend. Gated on lint-build so it only
    # runs once the cheap checks pass. See test/e2e/ for the harness.
    needs: lint-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install app deps
        working-directory: app
        run: npm ci
      - name: Install e2e deps + browser
        working-directory: test/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run e2e (backends + BFF + Playwright)
        run: bash test/e2e/run.sh
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test/e2e/playwright-report
            test/e2e/test-results
            test/e2e/.state/*.log
          retention-days: 7
