name: docker

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

env:
  TZ: UTC

# Serialize publishes; never cancel one mid-manifest-push.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
      # Build once locally and BOOT it before anything reaches the registry —
      # a crash-on-boot image must never become :latest (the deploy workflow
      # rolls the cluster onto whatever this pushes).
      - name: Build image (loaded locally for the smoke test)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          load: true
          push: false
          tags: reminders-app:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Boot smoke test before pushing
        run: bash app/scripts/smoke-image.sh reminders-app:smoke
      - name: Push
        id: push
        # A pure gha-cache hit of the build above (~seconds) — same layers.
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
      - name: Record pushed digest
        run: |
          mkdir -p "$RUNNER_TEMP/image"
          echo "${{ steps.push.outputs.digest }}" > "$RUNNER_TEMP/image/digest.txt"
          echo "Published ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload image digest
        uses: actions/upload-artifact@v4
        with:
          name: image-digest
          path: ${{ runner.temp }}/image/digest.txt
          retention-days: 14
